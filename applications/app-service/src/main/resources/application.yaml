server:
  port: 8080
spring:
  application:
    name: "franchise-service"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
