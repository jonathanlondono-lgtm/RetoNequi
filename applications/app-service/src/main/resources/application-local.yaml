spring:
  config:
    activate:
      on-profile: local

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nequi_db}
    user: ${DB_USER:nequi_user}
    password: ${DB_PASSWORD:nequi_password}
    locations: classpath:db/migration

adapters:
  r2dbc:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:nequi_db}
    schema: "public"
    username: ${DB_USER:nequi_user}
    password: ${DB_PASSWORD:nequi_password}

resilience4j:
  circuitbreaker:
    instances:
      databaseNequi:
        sliding-window-size: ${CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:5}
        failure-rate-threshold: ${CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
        wait-duration-in-open-state: ${CIRCUIT_BREAKER_WAIT_DURATION:10s}
        permitted-number-of-calls-in-half-open-state: ${CIRCUIT_BREAKER_HALF_OPEN_CALLS:3}
  timelimiter:
    instances:
      databaseNequi:
        timeout-duration: ${CIRCUIT_BREAKER_TIMEOUT:3s}
  retry:
    instances:
      databaseNequi:
        max-attempts: ${RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${RETRY_WAIT_DURATION:500ms}
